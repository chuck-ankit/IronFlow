    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.7"/>
    <path d="M0 -30 L0 30 M-30 0 L30 0" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
    <text x="0" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="bold">IRONFLOW</text>
  </g>
  <g transform="translate(200, 180)">
    <rect x="0" y="0" width="60" height="100" rx="8" fill="#22d3ee" opacity="0.2"/>
    <rect x="10" y="20" width="40" height="60" rx="4" fill="#22d3ee" opacity="0.4"/>
  </g>
  <g transform="translate(600, 400)">
